name: Build Native Apps

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --dart-define=SUPABASE_URL=${{ vars.SUPABASE_URL }} --dart-define=SUPABASE_ANON_KEY=${{ vars.SUPABASE_ANON_KEY }}

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Voxora-Android-APK
          path: build/app/outputs/flutter-apk/app-release.apk

  build_windows:
    name: Build Windows Desktop App
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release --dart-define=SUPABASE_URL=${{ vars.SUPABASE_URL }} --dart-define=SUPABASE_ANON_KEY=${{ vars.SUPABASE_ANON_KEY }}

      - name: Zip Windows Release
        run: Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath Voxora-Windows.zip

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Voxora-Windows-App
          path: Voxora-Windows.zip

  create_release:
    name: Create GitHub Release
    needs: [build_android, build_windows]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: Voxora-Android-APK
          path: release-artifacts

      - name: Download Windows
        uses: actions/download-artifact@v4
        with:
          name: Voxora-Windows-App
          path: release-artifacts

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-build-${{ github.run_number }}
          name: Voxora Nightly Build #${{ github.run_number }}
          body: |
            ## 🚀 Native Apps Ready!
            Download the real applications below:
            - **Android**: Download the `.apk` file and install it on your phone.
            - **Windows**: Download the `.zip` file, extract it, and run `voxora.exe`.
          files: |
            release-artifacts/app-release.apk
            release-artifacts/Voxora-Windows.zip
