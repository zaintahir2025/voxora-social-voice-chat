name: voxora
description: Voxora - Social friends, posts, chat, calls, and games powered by Supabase.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.8.4
  provider: ^6.1.2
  google_fonts: ^6.2.1
  chess: 0.8.1
  intl: ^0.20.2
  flutter_webrtc: ^1.4.1
  flutter_svg: ^2.3.0
  cupertino_icons: ^1.0.9
  file_selector: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/

flutter_launcher_icons:
  image_path: assets/logo_dark.png
  android: true
  ios: true
  remove_alpha_ios: true
  min_sdk_android: 23
  web:
    generate: true
    image_path: assets/logo_dark.png
    background_color: "#0B192C"
    theme_color: "#0B192C"
  windows:
    generate: true
    image_path: assets/logo_dark.png
    icon_size: 48
  macos:
    generate: true
    image_path: assets/logo_dark.png
